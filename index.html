<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="icon" type="image/png" href="logo.png">

    <title>Fluxo | Gestão Premium</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --bg: #F2F2F7;
            --card: #FFFFFF;
            --primary: #000000;
            --va: #34C759;
            --reserve: #1C1C1E;
            --danger-text: #FF453A;
            --text-main: #1C1C1E;
            --text-sub: #8E8E93;
            --border: #E5E5EA;
            --radius-lg: 28px;
            --radius-md: 20px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text-main); 
            padding-bottom: 140px; 
            -webkit-font-smoothing: antialiased; 
        }

        .container { max-width: 450px; margin: 0 auto; padding: 24px; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; padding-top: env(safe-area-inset-top); }
        .header h1 { font-size: 2rem; font-weight: 800; letter-spacing: -1.5px; }
        .logo-img { width: 40px; height: 40px; border-radius: 12px; object-fit: cover; border: 1px solid var(--border); }

        /* MAIN CARD */
        .main-card { 
            background: var(--primary); 
            color: white; 
            padding: 32px; 
            border-radius: var(--radius-lg); 
            box-shadow: 0 20px 40px rgba(0,0,0,0.15); 
            margin-bottom: 16px; 
            position: relative;
        }
        .main-card span { font-size: 0.75rem; font-weight: 700; opacity: 0.5; text-transform: uppercase; letter-spacing: 1.5px; display: block; margin-bottom: 8px; }
        .main-card h2 { font-size: 2.8rem; font-weight: 800; letter-spacing: -2px; margin-bottom: 24px; }
        
        .sub-info { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding-top: 24px; border-top: 1px solid rgba(255,255,255,0.1); }
        .sub-info div p { font-weight: 700; font-size: 1.1rem; }

        .alert-icon { position: absolute; top: 32px; right: 32px; color: var(--danger-text); cursor: pointer; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        /* RESERVE CARD HOME */
        .reserve-mini-card { 
            background: var(--reserve); 
            color: white; 
            padding: 24px; 
            border-radius: var(--radius-md); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 32px; 
        }
        .reserve-mini-card div span { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; opacity: 0.5; letter-spacing: 1px; }
        .reserve-mini-card div h3 { font-size: 1.5rem; font-weight: 800; margin-top: 4px; }

        .section-title { font-size: 0.8rem; font-weight: 800; color: var(--text-sub); text-transform: uppercase; letter-spacing: 1px; margin: 40px 0 16px 4px; display: flex; align-items: center; gap: 10px; }
        
        .panel { background: var(--card); border-radius: var(--radius-md); padding: 24px; margin-bottom: 24px; border: 1px solid var(--border); }
        
        .input-group { position: relative; margin-bottom: 12px; }
        .input-group i { position: absolute; left: 16px; top: 16px; color: var(--text-sub); width: 18px; }
        
        input, select { 
            width: 100%; padding: 16px 16px 16px 48px; border: 1px solid var(--border); border-radius: 16px; 
            font-size: 1rem; background: #F9F9F9; font-weight: 600; outline: none; color: var(--text-main);
        }

        .btn-action { 
            width: 100%; padding: 18px; border-radius: 18px; border: none; font-weight: 700; 
            font-size: 1rem; background: var(--primary); color: white; display: flex; 
            align-items: center; justify-content: center; gap: 12px; 
        }
        .btn-action:active { transform: scale(0.98); }

        /* LISTA DE CARGA DINÂMICA EM CONFIG */
        .fatura-entry {
            display: flex; gap: 8px; margin-bottom: 10px; align-items: center;
            background: #F2F2F7; padding: 10px; border-radius: 12px;
        }
        .fatura-entry select, .fatura-entry input { padding: 8px; font-size: 0.8rem; padding-left: 10px; flex: 1; margin-bottom: 0; background: white; }
        .btn-remove { background: none; border: none; color: var(--danger-text); padding: 5px; cursor: pointer; }

        .btn-add-item {
            background: none; border: 2px dashed var(--border); color: var(--text-sub);
            width: 100%; padding: 12px; border-radius: 14px; font-weight: 700; font-size: 0.8rem;
            display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 15px;
        }

        .bank-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 20px; 
            background: white; 
            border-radius: 20px; 
            margin-bottom: 12px; 
            border: 1px solid var(--border); 
        }

        .nav-bar { 
            position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.9); 
            backdrop-filter: blur(20px); display: flex; justify-content: space-around; 
            padding: 16px 10px calc(24px + env(safe-area-inset-bottom)); border-top: 0.5px solid var(--border); z-index: 1000; 
        }
        .nav-btn { background: none; border: none; color: var(--text-sub); font-size: 0.6rem; font-weight: 700; flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; }
        .nav-btn.active { color: var(--primary); }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="container">
        <header class="header">
            <h1 id="page-title">Início</h1>
            <img src="logo.png" alt="Logo" class="logo-img" onerror="this.style.display='none'">
        </header>

        <div id="tab-home" class="view">
            <div class="main-card">
                <div id="alert-reserva" class="alert-icon hidden" onclick="alert('⚠️ Aviso: Gastos excederam a receita. O sistema está projetando o uso da sua Reserva de Emergência para fechar o mês.')">
                    <i data-lucide="alert-circle"></i>
                </div>
                <span>Saldo Disponível</span>
                <h2 id="txt-saldo-livre">R$ 0,00</h2>
                <div class="sub-info">
                    <div><span>Receitas</span><p id="txt-salario">R$ 0,00</p></div>
                    <div><span>Despesas</span><p id="txt-comprometido" style="color: #FF6B6B;">R$ 0,00</p></div>
                </div>
            </div>

            <div class="reserve-mini-card" onclick="switchTab('banks', 'Bancos')">
                <div><span>Fundo de Reserva</span><h3 id="txt-reserva-total">R$ 0,00</h3></div>
                <i data-lucide="shield-check"></i>
            </div>

            <p class="section-title"><i data-lucide="plus"></i> Registro Rápido</p>
            <div class="panel">
                <div class="input-group"><i data-lucide="tag"></i><input type="text" id="add-nome" placeholder="Descrição"></div>
                <div style="display: flex; gap: 12px;">
                    <div class="input-group" style="flex: 1;"><i data-lucide="dollar-sign"></i><input type="number" id="add-valor" placeholder="0,00"></div>
                    <div class="input-group" style="flex: 1.2;"><i data-lucide="credit-card"></i><select id="add-metodo"></select></div>
                </div>
                <div class="input-group">
                    <i data-lucide="layers"></i>
                    <select id="add-num-parcelas">
                        <option value="1">À vista</option>
                        <option value="2">2x</option><option value="3">3x</option><option value="4">4x</option>
                        <option value="6">6x</option><option value="10">10x</option><option value="12">12x</option>
                    </select>
                </div>
                <button class="btn-action" onclick="lancarGasto()">Registrar</button>
            </div>
        </div>

        <div id="tab-banks" class="view hidden">
            <p class="section-title"><i data-lucide="landmark"></i> Meus Bancos</p>
            <div id="lista-detalhe-bancos"></div>

            <p class="section-title"><i data-lucide="shield"></i> Gestão da Reserva</p>
            <div class="panel" style="background: var(--reserve); color: white;">
                <div style="margin-bottom: 24px;">
                    <span style="opacity: 0.5; font-size: 0.7rem;">MONTANTE ACUMULADO</span>
                    <h2 id="txt-reserva-balancete" style="font-size: 2.2rem; font-weight: 800;">R$ 0,00</h2>
                </div>
                <div style="display: flex; gap: 10px;">
                    <input type="number" id="add-reserva-valor" placeholder="Valor Aporte" style="padding-left: 15px; background: rgba(255,255,255,0.1); border: none; color: white;">
                    <button class="btn-action" style="width: 80px; background: white; color: black;" onclick="aportarReserva()"><i data-lucide="plus"></i></button>
                </div>
            </div>
        </div>

        <div id="tab-projection" class="view hidden">
            <div id="lista-meses-projecao"></div>
        </div>

        <div id="tab-config" class="view hidden">
            <p class="section-title">Rendas Mensais</p>
            <div class="panel">
                <input type="number" id="cfg-salario" placeholder="Salário Base">
                <input type="number" id="cfg-va" placeholder="Valor VA" style="margin-top:12px;">
                <button class="btn-action" style="margin-top: 15px;" onclick="salvarRendas()">Salvar Rendas</button>
            </div>

            <p class="section-title">Novo Cartão</p>
            <div class="panel">
                <input type="text" id="card-nome" placeholder="Nome do Banco">
                <input type="number" id="card-dia" placeholder="Dia Vencimento" style="margin-top:12px;">
                
                <p style="font-size: 0.65rem; font-weight: 800; color: var(--text-sub); margin: 20px 0 10px 0;">ADICIONAR MESES COM FATURA:</p>
                <div id="carga-dinamica-container"></div>
                
                <button class="btn-add-item" onclick="addLinhaFaturaManual()">
                    <i data-lucide="calendar-plus"></i> + Adicionar Mês
                </button>

                <button class="btn-action" onclick="addCartao()">Cadastrar Cartão</button>
            </div>
            
            <button onclick="zerarTudo()" style="width:100%; color:var(--danger-text); padding:40px; border:none; background:none; font-weight:700; font-size: 0.75rem;">LIMPAR TUDO</button>
        </div>
    </div>

    <nav class="nav-bar">
        <button class="nav-btn active" onclick="switchTab('home', 'Início')"><i data-lucide="layout-dashboard"></i>Início</button>
        <button class="nav-btn" onclick="switchTab('banks', 'Bancos')"><i data-lucide="landmark"></i>Bancos</button>
        <button class="nav-btn" onclick="switchTab('projection', 'Projeção')"><i data-lucide="trending-up"></i>Projeção</button>
        <button class="nav-btn" onclick="switchTab('config', 'Ajustes')"><i data-lucide="settings"></i>Ajustes</button>
    </nav>

<script>
    let db = { salario: 0, va: 0, cartoes: [], compras: [], reserva: 0 };
    const mesesStr = ["Jan", "Fev", "Mar", "Abr", "Mai", "Jun", "Jul", "Ago", "Set", "Out", "Nov", "Dez"];

    window.onload = () => {
        const saved = localStorage.getItem('fluxo_v17_db');
        if(saved) db = JSON.parse(saved);
        if(db.reserva === undefined) db.reserva = 0;
        document.getElementById('cfg-salario').value = db.salario || '';
        document.getElementById('cfg-va').value = db.va || '';
        atualizarInterface();
    };

    function switchTab(t, title) {
        document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-'+t).classList.remove('hidden');
        document.getElementById('page-title').innerText = title;
        if(event) event.currentTarget.classList.add('active');
        lucide.createIcons();
    }

    function addLinhaFaturaManual() {
        const container = document.getElementById('carga-dinamica-container');
        const div = document.createElement('div');
        div.className = 'fatura-entry';
        const currentYear = new Date().getFullYear();
        div.innerHTML = `
            <select class="f-mes">${mesesStr.map((m, i) => `<option value="${i}">${m}</option>`).join('')}</select>
            <select class="f-ano"><option value="${currentYear}">${currentYear}</option><option value="${currentYear+1}">${currentYear+1}</option></select>
            <input type="number" class="f-valor" placeholder="R$">
            <button class="btn-remove" onclick="this.parentElement.remove()"><i data-lucide="x"></i></button>
        `;
        container.appendChild(div);
        lucide.createIcons();
    }

    function aportarReserva() {
        const val = parseFloat(document.getElementById('add-reserva-valor').value) || 0;
        if(val > 0) { db.reserva += val; document.getElementById('add-reserva-valor').value = ''; save(); }
    }

    function addCartao() {
        const nome = document.getElementById('card-nome').value.trim();
        const dia = parseInt(document.getElementById('card-dia').value);
        if(!nome || !dia) return alert("Preencha nome e dia!");
        if(db.cartoes.find(c => c.nome.toLowerCase() === nome.toLowerCase())) return alert("Banco já cadastrado!");

        const faturas = {};
        document.querySelectorAll('.fatura-entry').forEach(row => {
            const m = row.querySelector('.f-mes').value;
            const a = row.querySelector('.f-ano').value;
            const v = parseFloat(row.querySelector('.f-valor').value) || 0;
            if(v > 0) faturas[`${m}-${a}`] = v;
        });

        db.cartoes.push({ id: 'c'+Date.now(), nome, dia, faturasIniciais: faturas });
        save();
        alert(`✅ ${nome} cadastrado!`);
        document.getElementById('card-nome').value = ''; document.getElementById('card-dia').value = '';
        document.getElementById('carga-dinamica-container').innerHTML = '';
    }

    function lancarGasto() {
        const nome = document.getElementById('add-nome').value;
        const valor = parseFloat(document.getElementById('add-valor').value);
        const metodo = document.getElementById('add-metodo').value;
        const parcelas = parseInt(document.getElementById('add-num-parcelas').value);
        if(!nome || !valor) return;
        const valorP = valor / parcelas;
        const hoje = new Date();
        for(let i=0; i<parcelas; i++) {
            const d = new Date(hoje.getFullYear(), hoje.getMonth() + i, 1);
            db.compras.push({ id: Date.now()+i, nome: parcelas > 1 ? `${nome} (${i+1}/${parcelas})` : nome, valor: valorP, metodo, data: d.toISOString() });
        }
        save();
        document.getElementById('add-nome').value = ''; document.getElementById('add-valor').value = '';
    }

    function salvarRendas() { db.salario = parseFloat(document.getElementById('cfg-salario').value) || 0; db.va = parseFloat(document.getElementById('cfg-va').value) || 0; save(); alert("Salvo!"); }
    function save() { localStorage.setItem('fluxo_v17_db', JSON.stringify(db)); atualizarInterface(); }

    function atualizarInterface() {
        const hoje = new Date();
        const mAt = hoje.getMonth();
        const aAt = hoje.getFullYear();
        const proj = {};
        const bancosDet = {};

        for(let i=0; i<12; i++) {
            const d = new Date(aAt, mAt+i, 1);
            proj[`${d.getMonth()}-${d.getFullYear()}`] = { cartao: 0, pix: 0 };
        }

        db.cartoes.forEach(c => {
            bancosDet[c.id] = { nome: c.nome, atual: 0 };
            if(c.faturasIniciais) Object.keys(c.faturasIniciais).forEach(ch => {
                if(proj[ch]) { proj[ch].cartao += c.faturasIniciais[ch]; if(ch === `${mAt}-${aAt}`) bancosDet[c.id].atual += c.faturasIniciais[ch]; }
            });
        });

        db.compras.forEach(c => {
            const dc = new Date(c.data);
            const ch = `${dc.getMonth()}-${dc.getFullYear()}`;
            if(proj[ch]) {
                if(c.metodo === 'pix') proj[ch].pix += c.valor;
                else if(c.metodo !== 'va') { proj[ch].cartao += c.valor; if(ch === `${mAt}-${aAt}` && bancosDet[c.metodo]) bancosDet[c.metodo].atual += c.valor; }
            }
        });

        const totalComp = proj[`${mAt}-${aAt}`].pix + proj[`${mAt}-${aAt}`].cartao;
        let livre = db.salario - totalComp;
        let resEx = db.reserva;
        
        if(livre < 0) {
            const def = Math.abs(livre);
            if(resEx >= def) { resEx -= def; livre = 0; }
            else { livre = -(def - resEx); resEx = 0; }
            document.getElementById('alert-reserva').classList.remove('hidden');
        } else {
            document.getElementById('alert-reserva').classList.add('hidden');
        }

        document.getElementById('txt-saldo-livre').innerText = format(livre);
        document.getElementById('txt-salario').innerText = format(db.salario);
        document.getElementById('txt-comprometido').innerText = format(totalComp);
        document.getElementById('txt-reserva-total').innerText = format(resEx);
        document.getElementById('txt-reserva-balancete').innerText = format(resEx);

        document.getElementById('lista-detalhe-bancos').innerHTML = Object.values(bancosDet).map(b => `<div class="bank-item"><h4>${b.nome}</h4><b>${format(b.atual)}</b></div>`).join('');
        
        document.getElementById('lista-meses-projecao').innerHTML = `<p class="section-title">Próximos Meses</p>` + Object.keys(proj).map(ch => {
            const [m, a] = ch.split('-');
            const totalM = proj[ch].pix + proj[ch].cartao;
            const sbr = db.salario - totalM;
            return `<div class="panel" style="display:flex; justify-content:space-between; align-items:center;"><div><span style="font-weight:800; font-size:0.7rem;">${mesesStr[m]} ${a}</span><h4>${format(totalM)}</h4></div><b style="color:${sbr < 0 ? 'var(--danger-text)' : 'var(--va)'}">${format(sbr)}</b></div>`;
        }).join('');

        const sel = document.getElementById('add-metodo');
        sel.innerHTML = '<option value="pix">Pix / Débito</option><option value="va">V.A.</option>' + db.cartoes.map(c => `<option value="${c.id}">${c.nome}</option>`).join('');
        lucide.createIcons();
    }

    function format(v) { return v.toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'}); }
    function zerarTudo() { if(confirm("Apagar TUDO?")) { localStorage.clear(); location.reload(); } }
</script>
</body>
</html>
