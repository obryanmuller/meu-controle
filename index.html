<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="icon" type="image/png" href="logo.png">
    <title>Fluxo | Neo-Futurista</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            /* PALETA FUTURISTA */
            --bg: #000000; /* Preto Absoluto */
            --card: #1C1C1E; /* Cinza Escuro */
            --primary: #FFFFFF;
            --accent: #00D8FF; /* Azul Elétrico Neon */
            --va: #00FFC2; /* Ciano/Verde Neon */
            --reserve: #FFFFFF;
            --danger: #FF00FF; /* Magenta Neon */
            --text-main: #FFFFFF;
            --text-sub: #8E8E93;
            --border: rgba(255,255,255,0.08);
            --radius-lg: 20px;
            --radius-md: 14px;
            --radius-sm: 10px;
            /* EFEITO DE BRILHO (GLOW) */
            --glow: 0 0 15px rgba(0, 216, 255, 0.4);
            --glow-danger: 0 0 15px rgba(255, 0, 255, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background: var(--bg); 
            color: var(--text-main); 
            padding-bottom: 120px; 
            -webkit-font-smoothing: antialiased;
        }

        .container { max-width: 450px; margin: 0 auto; padding: 0 20px; }

        /* HEADER */
        .header { 
            padding: 60px 0 20px 0; 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-end;
            position: sticky;
            top: 0;
            background: var(--bg);
            z-index: 100;
        }
        .header h1 { font-size: 2.2rem; font-weight: 800; letter-spacing: -1.5px; }
        .logo-img { width: 35px; height: 35px; border-radius: 8px; border: 1.5px solid var(--accent); box-shadow: 0 0 10px rgba(0, 216, 255, 0.6); }

        /* MAIN CARD - CARBON & GLOW */
        .main-card { 
            background-color: #101010;
            background-image: linear-gradient(315deg, #101010 0%, #000000 74%);
            color: white; 
            padding: 24px; 
            border-radius: var(--radius-lg); 
            box-shadow: 0 20px 50px rgba(0,216,255,0.15); 
            margin-bottom: 20px; 
            position: relative;
            border: 0.5px solid rgba(255,255,255,0.08);
        }
        .main-card span { font-size: 0.65rem; font-weight: 700; color: var(--accent); opacity: 0.7; text-transform: uppercase; letter-spacing: 1.5px; display: block; margin-bottom: 4px; }
        .main-card h2 { font-size: 2.7rem; font-weight: 800; letter-spacing: -2px; margin-bottom: 20px; }
        
        .sub-info { 
            display: flex; 
            justify-content: space-between; 
            padding-top: 20px; 
            border-top: 0.5px solid rgba(255,255,255,0.1); 
        }
        .sub-info div p { font-weight: 700; font-size: 1.05rem; }
        .sub-info div span { font-size: 0.6rem; color: var(--text-sub); font-weight: 600; text-transform: uppercase; }

        /* ALERT RADIAÇÃO */
        .alert-icon { position: absolute; top: 24px; right: 24px; color: var(--danger); animation: pulse 2s infinite; text-shadow: 0 0 10px var(--danger); }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* COFRE NEON */
        .reserve-mini-card { 
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            padding: 18px 20px; 
            border-radius: var(--radius-md); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 30px;
            border: 0.5px solid var(--border);
            box-shadow: var(--glow);
        }
        .reserve-mini-card h3 { font-size: 1.1rem; font-weight: 700; color: white; }
        .reserve-label { font-size: 0.7rem; color: var(--text-sub); font-weight: 600; text-transform: uppercase; }

        /* SECTIONS */
        .section-title { font-size: 0.85rem; font-weight: 700; color: var(--text-sub); text-transform: uppercase; margin: 30px 0 10px 4px; display: flex; align-items: center; gap: 8px; }
        
        .panel { 
            background: var(--card); 
            border-radius: var(--radius-md); 
            padding: 16px; 
            margin-bottom: 12px; 
            border: 0.5px solid var(--border);
        }
        
        /* INPUTS & BRILHO */
        input, select { 
            width: 100%; 
            padding: 12px; 
            border: 0.5px solid var(--border); 
            border-radius: 10px; 
            font-size: 1rem; 
            background: rgba(255,255,255,0.03); 
            font-weight: 500; 
            outline: none; 
            margin-bottom: 8px; 
            color: white;
            transition: 0.2s;
        }
        input:focus { border-color: var(--accent); box-shadow: var(--glow); }
        select { color: white; -webkit-appearance: none; }

        /* BOTOES NEON */
        .btn-action { 
            width: 100%; 
            padding: 16px; 
            border-radius: 14px; 
            border: none; 
            font-weight: 700; 
            font-size: 1rem; 
            background: var(--primary); 
            color: black; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 8px; 
            box-shadow: 0 4px 15px rgba(255,255,255,0.2);
        }
        .btn-action:active { transform: scale(0.96); opacity: 0.8; }

        /* LISTAS */
        .item-row { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 14px 0; 
            border-bottom: 0.5px solid var(--border); 
        }
        .item-row:last-child { border: none; }
        .item-row h4 { font-size: 1rem; font-weight: 600; }
        .item-row p { font-size: 0.8rem; color: var(--text-sub); }

        /* PROJEÇÃO NEON FEED */
        .projection-panel { border-color: var(--va); box-shadow: 0 0 10px rgba(0, 255, 194, 0.2); }
        .sobra-verde { color: var(--va); text-shadow: 0 0 10px var(--va); }
        .deficit-rosa { color: var(--danger); text-shadow: 0 0 10px var(--danger); }

        /* NAVBAR IOS GLASS & NEON */
        .nav-bar { 
            position: fixed; 
            bottom: 0; left: 0; right: 0; 
            background: rgba(0,0,0,0.6); 
            backdrop-filter: blur(25px); 
            -webkit-backdrop-filter: blur(25px);
            display: flex; 
            justify-content: space-around; 
            padding: 10px 10px calc(15px + env(safe-area-inset-bottom)); 
            border-top: 0.5px solid var(--border); 
            z-index: 1000; 
            box-shadow: 0 -10px 30px rgba(0,216,255,0.05);
        }
        .nav-btn { background: none; border: none; color: var(--text-sub); font-size: 0.6rem; font-weight: 600; flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav-btn.active { color: var(--accent); text-shadow: var(--glow); }

        .hidden { display: none !important; }

        /* FORMULÁRIO DE FATURAS */
        .fatura-entry { display: flex; gap: 8px; margin-bottom: 8px; padding: 10px; background: rgba(255,255,255,0.02); border-radius: 12px; border: 0.5px solid var(--border); }
        .fatura-entry select, .fatura-entry input { margin-bottom: 0; background: rgba(255,255,255,0.05); font-size: 0.85rem; border: none; }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 id="page-title">Início</h1>
            <img src="logo.png" alt="Logo" class="logo-img" onerror="this.style.display='none'">
        </header>

        <div id="tab-home" class="view">
            <div class="main-card">
                <div id="alert-reserva" class="alert-icon hidden" onclick="alert('⚠️ Aviso: Saldo insuficiente. Fundo de Reserva ativado para cobrir o rombo.')">
                    <i data-lucide="scan-face"></i>
                </div>
                <span>Saldo Disponível</span>
                <h2 id="txt-saldo-livre">R$ 0,00</h2>
                <div class="sub-info">
                    <div><span style="color: var(--va)">Ganhos</span><p id="txt-salario">R$ 0,00</p></div>
                    <div><span style="color: var(--danger)">Saídas</span><p id="txt-comprometido" style="color: #FFFFFF;">R$ 0,00</p></div>
                </div>
            </div>

            <div class="reserve-mini-card" onclick="switchTab('banks', 'Bancos')">
                <div>
                    <span class="reserve-label">Montante Real</span>
                    <h3 id="txt-reserva-total">R$ 0,00</h3>
                </div>
                <i data-lucide="shield-check" color="#00D8FF" style="filter: drop-shadow(0 0 8px rgba(0,216,255,0.8))"></i>
            </div>

            <p class="section-title"><i data-lucide="zap" size="14"></i> Novo Lançamento</p>
            <div class="panel">
                <input type="text" id="add-nome" placeholder="O que você comprou?">
                <div style="display: flex; gap: 10px;">
                    <input type="number" id="add-valor" placeholder="R$" style="flex:1">
                    <select id="add-metodo" style="flex:1.2"></select>
                </div>
                <select id="add-num-parcelas">
                    <option value="1">Pagamento Único</option>
                    <option value="2">2x</option><option value="3">3x</option><option value="6">6x</option><option value="12">12x</option>
                </select>
                <button class="btn-action" onclick="lancarGasto()"><i data-lucide="rocket"></i> Registrar</button>
            </div>
        </div>

        <div id="tab-banks" class="view hidden">
            <p class="section-title"><i data-lucide="landmark"></i> Instituições</p>
            <div id="lista-detalhe-bancos"></div>
            
            <p class="section-title"><i data-lucide="shield-check"></i> Gestão do Cofre</p>
            <div class="panel" style="background: rgba(255,255,255,0.03); border: none; color: white; box-shadow: var(--glow)">
                <span style="opacity: 0.5; font-size: 0.7rem; font-weight: 700; text-transform: uppercase;">DISPONÍVEL HOJE</span>
                <h2 id="txt-reserva-balancete" style="font-size: 2.3rem; font-weight: 800; margin: 5px 0 20px 0; color: white;">R$ 0,00</h2>
                <div style="display: flex; gap: 10px;">
                    <input type="number" id="add-reserva-valor" placeholder="R$ Valor do Aporte" style="background: rgba(255,255,255,0.1); color: white;">
                    <button class="btn-action" style="width: 70px; background: white; color: black; box-shadow: 0 4px 10px rgba(0,0,0,0.2)" onclick="aportarReserva()"><i data-lucide="plus"></i></button>
                </div>
            </div>
        </div>

        <div id="tab-projection" class="view hidden">
            <p class="section-title"><i data-lucide="calendar-days"></i> Calendário de Projeção</p>
            <div id="lista-meses-projecao"></div>
        </div>

        <div id="tab-config" class="view hidden">
            <p class="section-title"><i data-lucide="sliders"></i> Rendas</p>
            <div class="panel">
                <input type="number" id="cfg-salario" placeholder="Renda Mensal">
                <input type="number" id="cfg-va" placeholder="V.A. Mensal">
                <button class="btn-action" onclick="salvarRendas()"><i data-lucide="save"></i> Salvar</button>
            </div>
            
            <p class="section-title"><i data-lucide="plus-circle"></i> Novo Cartão</p>
            <div class="panel">
                <input type="text" id="card-nome" placeholder="Nome do Banco">
                <input type="number" id="card-dia" placeholder="Dia Vencimento">
                <div id="carga-dinamica-container"></div>
                <button onclick="addLinhaFaturaManual()" style="background:none; border:1px dashed var(--border); width:100%; padding:12px; border-radius:12px; font-weight:700; font-size:0.7rem; color:var(--text-sub); margin: 10px 0">+ IMPORTAR FATURA EXISTENTE</button>
                <button class="btn-action" onclick="addCartao()">Cadastrar</button>
            </div>
            <button onclick="zerarTudo()" style="width:100%; color:var(--danger); padding:40px; border:none; background:none; font-weight:700; font-size: 0.75rem; text-shadow: 0 0 5px var(--danger)">APAGAR TUDO</button>
        </div>
    </div>

    <nav class="nav-bar">
        <button class="nav-btn active" onclick="switchTab('home', 'Início')"><i data-lucide="radar"></i>Início</button>
        <button class="nav-btn" onclick="switchTab('banks', 'Bancos')"><i data-lucide="landmark"></i>Bancos</button>
        <button class="nav-btn" onclick="switchTab('projection', 'Projeção')"><i data-lucide="file-chart-line"></i>Projeção</button>
        <button class="nav-btn" onclick="switchTab('config', 'Ajustes')"><i data-lucide="terminal"></i>Ajustes</button>
    </nav>

<script>
    const DB_KEY = 'fluxo_v25_pro_final'; // NOVA CHAVE PARA GARANTIR MATEMÁTICA CORRETA
    let db = { salario: 0, va: 0, cartoes: [], compras: [], reserva: 0, aportesReserva: {} };
    const mesesStr = ["Jan", "Fev", "Mar", "Abr", "Mai", "Jun", "Jul", "Ago", "Set", "Out", "Nov", "Dez"];

    window.onload = () => {
        const saved = localStorage.getItem(DB_KEY);
        if(saved) db = JSON.parse(saved);
        if(db.reserva === undefined) db.reserva = 0;
        if(!db.aportesReserva) db.aportesReserva = {};
        document.getElementById('cfg-salario').value = db.salario || '';
        document.getElementById('cfg-va').value = db.va || '';
        atualizarInterface();
    };

    function save() { localStorage.setItem(DB_KEY, JSON.stringify(db)); atualizarInterface(); }

    function aportarReserva() {
        const val = parseFloat(document.getElementById('add-reserva-valor').value) || 0;
        if(val > 0) {
            const hoje = new Date();
            // Lógica de mês foco (se passou do dia de vencimento, aporta no próximo mês)
            let mF = hoje.getMonth(), aF = hoje.getFullYear();
            let maiorV = 0; db.cartoes.forEach(c => { if(c.dia > maiorV) maiorV = c.dia; });
            if(maiorV > 0 && hoje.getDate() > maiorV) {
                const next = new Date(aF, mF + 1, 1); mF = next.getMonth(); aF = next.getFullYear();
            }
            const chave = `${mF}-${aF}`;
            db.reserva += val; // Soma no cofre
            db.aportesReserva[chave] = (db.aportesReserva[chave] || 0) + val; // Gasto no mês
            document.getElementById('add-reserva-valor').value = '';
            save();
        }
    }

    function atualizarInterface() {
        const hoje = new Date();
        const diaAtual = hoje.getDate();
        let maiorV = 0; db.cartoes.forEach(c => { if(c.dia > maiorV) maiorV = c.dia; });

        let mF = hoje.getMonth(), aF = hoje.getFullYear(), antecipado = false;
        if(maiorV > 0 && diaAtual > maiorV) {
            const next = new Date(aF, mF + 1, 1); mF = next.getMonth(); aF = next.getFullYear(); antecipado = true;
        }

        const proj = {};
        for(let i=0; i<12; i++) {
            const d = new Date(hoje.getFullYear(), hoje.getMonth() + i, 1);
            const ch = `${d.getMonth()}-${d.getFullYear()}`;
            proj[ch] = { cartao: 0, pix: 0, resAporte: db.aportesReserva[ch] || 0 };
        }

        const bancosDet = {};
        db.cartoes.forEach(c => {
            bancosDet[c.id] = { nome: c.nome, fat: 0 };
            if(c.faturasIniciais) Object.keys(c.faturasIniciais).forEach(ch => {
                if(proj[ch]) { proj[ch].cartao += c.faturasIniciais[ch]; if(ch === `${mF}-${aF}`) bancosDet[c.id].fat += c.faturasIniciais[ch]; }
            });
        });

        db.compras.forEach(c => {
            const dc = new Date(c.data); const ch = `${dc.getMonth()}-${dc.getFullYear()}`;
            if(proj[ch]) {
                if(c.metodo === 'pix') proj[ch].pix += c.valor;
                else if(c.metodo !== 'va') {
                    proj[ch].cartao += c.valor;
                    if(ch === `${mF}-${aF}` && bancosDet[c.metodo]) bancosDet[c.metodo].fat += c.valor;
                }
            }
        });

        const dadosM = proj[`${mF}-${aF}`] || {cartao:0, pix:0, resAporte:0};
        const totalS = dadosM.cartao + dadosM.pix + dadosM.resAporte;
        let livre = db.salario - totalS;
        
        // MATEMÁTICA DA RESERVA REAL (MATEMÁTICA CORRIGIDA E BLINDADA)
        // livreCalculado pode ser negativo (rombo). Abatemos isso da reserva global.
        let resReal = db.reserva;
        if(livre < 0) {
            document.getElementById('alert-reserva').classList.remove('hidden');
            resReal = Math.max(0, db.reserva + livre); // livre é negativo, então abate
        } else {
            document.getElementById('alert-reserva').classList.add('hidden');
        }

        document.getElementById('txt-saldo-livre').innerText = format(livre);
        document.getElementById('txt-saldo-livre').style.color = livre < 0 ? 'var(--danger)' : 'white';
        if(livre < 0) document.getElementById('txt-saldo-livre').style.textShadow = '0 0 10px var(--danger)';
        else document.getElementById('txt-saldo-livre').style.textShadow = 'none';

        document.getElementById('txt-salario').innerText = format(db.salario);
        document.getElementById('txt-comprometido').innerText = format(totalS);
        document.getElementById('txt-reserva-total').innerText = format(resReal);
        document.getElementById('txt-reserva-balancete').innerText = format(resReal);

        // LISTA BANCÁRIA
        document.getElementById('lista-detalhe-bancos').innerHTML = Object.values(bancosDet).map(b => `
            <div class="panel">
                <div class="item-row"><div><h4>${b.nome}</h4><p>Fatura ${mesesStr[mF]}</p></div><b>${format(b.fat)}</b></div>
            </div>`).join('');
        
        // PROJEÇÃO MENSAL
        document.getElementById('lista-meses-projecao').innerHTML = Object.keys(proj).map(ch => {
            const [m, a] = ch.split('-'); const tM = proj[ch].pix + proj[ch].cartao + proj[ch].resAporte; const sbr = db.salario - tM;
            return `<div class="panel projection-panel" style="display:flex; justify-content:space-between; align-items:center;">
                <div><span style="font-weight:700; font-size:0.75rem; color:var(--text-sub)">${mesesStr[m]} ${a}</span><h4 style="font-size:1.1rem; margin-top:2px">${format(tM)}</h4></div>
                <b class="${sbr < 0 ? 'deficit-rosa' : 'sobra-verde'}">${format(sbr)}</b>
            </div>`;
        }).join('');

        const sel = document.getElementById('add-metodo');
        sel.innerHTML = '<option value="pix">Dinheiro / Pix</option><option value="va">V.A.</option>' + db.cartoes.map(c => `<option value="${c.id}">${c.nome}</option>`).join('');
        lucide.createIcons();
    }

    function format(v) { return v.toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'}); }
    function lancarGasto() {
        const nome = document.getElementById('add-nome').value;
        const valor = parseFloat(document.getElementById('add-valor').value);
        const metodo = document.getElementById('add-metodo').value;
        const parcelas = parseInt(document.getElementById('add-num-parcelas').value);
        if(!nome || !valor) return alert("Preencha Descrição e Valor.");
        const vP = valor / parcelas; const hoje = new Date();
        for(let i=0; i<parcelas; i++) {
            const d = new Date(hoje.getFullYear(), hoje.getMonth() + i, hoje.getDate());
            db.compras.push({ id: Date.now()+i, nome: parcelas > 1 ? `${nome} (${i+1}/${parcelas})` : nome, valor: vP, metodo, data: d.toISOString() });
        }
        save(); document.getElementById('add-nome').value = ''; document.getElementById('add-valor').value = '';
    }
    function salvarRendas() { db.salario = parseFloat(document.getElementById('cfg-salario').value) || 0; db.va = parseFloat(document.getElementById('cfg-va').value) || 0; save(); alert("✅ Salvo!"); }
    function addLinhaFaturaManual() {
        const container = document.getElementById('carga-dinamica-container');
        const div = document.createElement('div'); div.className = 'fatura-entry';
        const y = new Date().getFullYear();
        div.innerHTML = `<select class="f-mes">${mesesStr.map((m, i) => `<option value="${i}">${m}</option>`).join('')}</select><select class="f-ano"><option value="${y}">${y}</option><option value="${y+1}">${y+1}</option></select><input type="number" class="f-valor" placeholder="R$"><button onclick="this.parentElement.remove()" style="border:none; background:none; color:var(--danger)">×</button>`;
        container.appendChild(div);
    }
    function addCartao() {
        const n = document.getElementById('card-nome').value.trim();
        const d = parseInt(document.getElementById('card-dia').value);
        if(!n || !d) return alert("Preencha nome e dia!");
        const fats = {}; document.querySelectorAll('.fatura-entry').forEach(row => {
            const ch = `${row.querySelector('.f-mes').value}-${row.querySelector('.f-ano').value}`;
            fats[ch] = parseFloat(row.querySelector('.f-valor').value) || 0;
        });
        db.cartoes.push({ id: 'c'+Date.now(), nome: n, dia: d, faturasIniciais: fats });
        save(); document.getElementById('card-nome').value = ''; document.getElementById('card-dia').value = ''; document.getElementById('carga-dinamica-container').innerHTML = '';
        alert("✅ Banco cadastrado!");
    }
    function switchTab(t, title) {
        document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-'+t).classList.remove('hidden');
        document.getElementById('page-title').innerText = title;
        if(event) event.currentTarget.classList.add('active');
        lucide.createIcons(); window.scrollTo(0,0);
    }
    function zerarTudo() { if(confirm("CUIDADO! Isso apagará todos os dados salvos no seu iPhone.")) { localStorage.clear(); location.reload(); } }
</script>
</body>
</html>
